version: '3.8'

services:
  web:
    build: .
    container_name: lamp_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html
    depends_on:
      - db
    networks:
      - lamp-net

  db:
    image: mariadb:10.11
    container_name: lamp_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: testdb
      MYSQL_USER: tinako
      MYSQL_PASSWORD: tinako123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - lamp-net

volumes:
  db_data:

networks:
  lamp-net:
    driver: bridge